<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mail Screener</title>
<style>
  :root {
    --bg: #1c1c1e; --panel: #2c2c2e; --panel2: #3a3a3c; --line: #48484a;
    --text: #f2f2f7; --muted: #98989f; --accent: #0a84ff; --green: #30d158;
    --red: #ff453a; --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 18px; margin: 0; display: flex; align-items: center; gap: 8px; }
  h1 .mail { font-size: 20px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
  .status-grid { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: var(--muted); }
  .dot.on { background: var(--green); } .dot.off { background: var(--red); }
  .kv { color: var(--muted); } .kv b { color: var(--text); font-weight: 600; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .chip { background: var(--panel2); border-radius: 20px; padding: 4px 12px; font-size: 13px; }
  .chip b { color: var(--accent); }
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab { flex: 1; padding: 7px; text-align: center; background: var(--panel); border: 1px solid var(--line);
         border-radius: var(--radius); cursor: pointer; color: var(--muted); user-select: none; }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  select, input, button { font: inherit; color: var(--text); }
  select, input[type=text], input[type=password] {
    background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; width: 100%;
  }
  .row { display: flex; gap: 8px; align-items: center; }
  .row > * { flex: 0 0 auto; } .row .grow { flex: 1 1 auto; }
  button { background: var(--accent); border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; color: #fff; }
  button.ghost { background: var(--panel2); border: 1px solid var(--line); color: var(--text); }
  button.danger { background: transparent; color: var(--red); padding: 4px 8px; }
  button:disabled { opacity: .4; cursor: default; }
  ul.list { list-style: none; margin: 12px 0 0; padding: 0; max-height: 360px; overflow-y: auto; }
  ul.list li { display: flex; justify-content: space-between; align-items: center; padding: 7px 4px;
               border-bottom: 1px solid var(--line); }
  ul.list li:last-child { border-bottom: none; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .muted { color: var(--muted); }
  .covers { font-size: 12px; color: var(--muted); }
  .err { color: var(--red); margin-top: 10px; min-height: 18px; }
  .empty { color: var(--muted); padding: 14px 4px; text-align: center; }
  label.field { display: block; margin-bottom: 12px; }
  label.field span { display: block; color: var(--muted); margin-bottom: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="mail">✉️</span> Mail Screener</h1>
    <button class="ghost" id="refreshBtn" onclick="refreshAll()">Refresh</button>
  </header>

  <!-- Status -->
  <div class="panel" id="statusPanel">
    <div class="status-grid">
      <span><span class="dot" id="dot"></span></span>
      <span class="kv" id="connText">connecting…</span>
      <span class="kv">v<b id="version">—</b></span>
      <span class="kv">up <b id="uptime">—</b></span>
      <span class="kv">last sweep <b id="lastSweep">—</b></span>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="lists" onclick="showTab('lists')">Lists</div>
    <div class="tab" data-tab="suggestions" onclick="showTab('suggestions')">Suggestions</div>
    <div class="tab" data-tab="settings" onclick="showTab('settings')">Settings</div>
  </div>

  <!-- Lists -->
  <div class="panel tabpane" id="pane-lists">
    <div class="row">
      <select class="grow" id="kindSelect" onchange="loadEntries()"></select>
    </div>
    <div class="row" style="margin-top:10px">
      <input type="text" class="grow" id="addValue" placeholder="name@example.com or *@example.com"
             onkeydown="if(event.key==='Enter') addEntry()">
      <button onclick="addEntry()">Add</button>
    </div>
    <ul class="list" id="entries"></ul>
    <div class="err" id="listsErr"></div>
  </div>

  <!-- Suggestions -->
  <div class="panel tabpane" id="pane-suggestions" style="display:none">
    <div class="row">
      <span class="muted">Min entries per domain</span>
      <input type="text" id="minVal" value="5" style="width:64px" onchange="loadSuggestions()">
      <button class="ghost" onclick="loadSuggestions()">Reload</button>
    </div>
    <ul class="list" id="suggestions"></ul>
    <div class="err" id="sugErr"></div>
  </div>

  <!-- Settings -->
  <div class="panel tabpane" id="pane-settings" style="display:none">
    <label class="field">
      <span>API Token</span>
      <input type="password" id="tokenInput" placeholder="screenerd API_TOKEN">
    </label>
    <div class="row">
      <button onclick="saveToken()">Save & Test</button>
      <span class="muted" id="settingsMsg"></span>
    </div>
    <p class="muted" style="font-size:12px">
      Stored in this browser only (localStorage). Same value as the daemon's <span class="mono">API_TOKEN</span>.
    </p>
  </div>
</div>

<script>
const KINDS = [
  ["whitelist", "Whitelist"], ["blocklist", "Blocklist"], ["newsletter", "Newsletters"],
  ["receipts", "Receipts"], ["group_allowlist", "Group Allowlist"],
];
const tokenKey = "screener.token";
let token = localStorage.getItem(tokenKey) || "";

// --- API helper ---
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (token) opts.headers["Authorization"] = "Bearer " + token;
  if (body !== undefined) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const resp = await fetch(path, opts);
  if (resp.status === 401) throw new Error("Unauthorized — check your token in Settings");
  if (resp.status === 204) return null;
  const text = await resp.text();
  const data = text ? JSON.parse(text) : null;
  if (!resp.ok) throw new Error((data && data.error) || ("HTTP " + resp.status));
  return data;
}

// --- Status ---
async function refreshStatus() {
  try {
    const s = await api("GET", "/status");
    document.getElementById("dot").className = "dot " + (s.connected ? "on" : "off");
    document.getElementById("connText").textContent = s.connected ? "daemon connected" : "daemon offline";
    document.getElementById("version").textContent = s.version || "—";
    document.getElementById("uptime").textContent = s.uptime || "—";
    document.getElementById("lastSweep").textContent = s.lastSweep ? relTime(s.lastSweep) : "never";
    const chips = document.getElementById("chips");
    chips.innerHTML = "";
    for (const [kind, label] of KINDS) {
      const n = (s.listSizes && s.listSizes[kind]) || 0;
      const el = document.createElement("span");
      el.className = "chip";
      el.innerHTML = label + " <b>" + n + "</b>";
      chips.appendChild(el);
    }
  } catch (e) {
    document.getElementById("dot").className = "dot off";
    document.getElementById("connText").textContent = e.message;
  }
}

function relTime(iso) {
  const d = new Date(iso), secs = (Date.now() - d.getTime()) / 1000;
  if (secs < 60) return Math.round(secs) + "s ago";
  if (secs < 3600) return Math.round(secs / 60) + "m ago";
  if (secs < 86400) return Math.round(secs / 3600) + "h ago";
  return Math.round(secs / 86400) + "d ago";
}

// --- Lists ---
function currentKind() { return document.getElementById("kindSelect").value; }

async function loadEntries() {
  const err = document.getElementById("listsErr"); err.textContent = "";
  const ul = document.getElementById("entries"); ul.innerHTML = "";
  try {
    const data = await api("GET", "/lists/" + currentKind());
    const entries = data.entries || [];
    if (!entries.length) { ul.innerHTML = '<li class="empty">No entries</li>'; return; }
    for (const v of entries) {
      const li = document.createElement("li");
      const span = document.createElement("span"); span.className = "mono"; span.textContent = v;
      const btn = document.createElement("button"); btn.className = "danger"; btn.textContent = "Remove";
      btn.onclick = () => removeEntry(v);
      li.appendChild(span); li.appendChild(btn); ul.appendChild(li);
    }
  } catch (e) { err.textContent = e.message; }
}

async function addEntry() {
  const input = document.getElementById("addValue"), err = document.getElementById("listsErr");
  const value = input.value.trim(); if (!value) return;
  err.textContent = "";
  try { await api("POST", "/lists/" + currentKind(), { value }); input.value = ""; await loadEntries(); await refreshStatus(); }
  catch (e) { err.textContent = e.message; }
}

async function removeEntry(value) {
  const err = document.getElementById("listsErr"); err.textContent = "";
  try { await api("DELETE", "/lists/" + currentKind() + "/" + encodeURIComponent(value)); await loadEntries(); await refreshStatus(); }
  catch (e) { err.textContent = e.message; }
}

// --- Suggestions ---
async function loadSuggestions() {
  const err = document.getElementById("sugErr"); err.textContent = "";
  const ul = document.getElementById("suggestions"); ul.innerHTML = "";
  const min = parseInt(document.getElementById("minVal").value, 10) || 5;
  try {
    const data = await api("GET", "/suggestions?min=" + min);
    const sug = data.suggestions || [];
    if (!sug.length) { ul.innerHTML = '<li class="empty">No suggestions</li>'; return; }
    for (const s of sug) {
      const li = document.createElement("li");
      const left = document.createElement("div");
      left.innerHTML = '<div class="mono">' + s.wildcard + '</div>' +
        '<div class="covers">' + s.kind + " · covers " + (s.covers ? s.covers.length : 0) + "</div>";
      const btn = document.createElement("button"); btn.textContent = "Apply";
      btn.onclick = () => applySuggestion(s.kind, s.wildcard);
      li.appendChild(left); li.appendChild(btn); ul.appendChild(li);
    }
  } catch (e) { err.textContent = e.message; }
}

async function applySuggestion(kind, wildcard) {
  const err = document.getElementById("sugErr"); err.textContent = "";
  try { await api("POST", "/suggestions/apply", { kind, wildcard }); await loadSuggestions(); await refreshStatus(); }
  catch (e) { err.textContent = e.message; }
}

// --- Settings ---
async function saveToken() {
  token = document.getElementById("tokenInput").value.trim();
  localStorage.setItem(tokenKey, token);
  const msg = document.getElementById("settingsMsg"); msg.textContent = "Testing…";
  try { const s = await api("GET", "/status"); msg.textContent = "OK — " + (s.connected ? "connected" : "offline") + ", v" + s.version; await refreshAll(); }
  catch (e) { msg.textContent = e.message; }
}

// --- Tabs ---
function showTab(name) {
  for (const t of document.querySelectorAll(".tab")) t.classList.toggle("active", t.dataset.tab === name);
  for (const p of document.querySelectorAll(".tabpane")) p.style.display = p.id === "pane-" + name ? "" : "none";
  if (name === "suggestions") loadSuggestions();
}

async function refreshAll() { await refreshStatus(); await loadEntries(); }

// --- Init ---
(function init() {
  const sel = document.getElementById("kindSelect");
  for (const [kind, label] of KINDS) {
    const o = document.createElement("option"); o.value = kind; o.textContent = label; sel.appendChild(o);
  }
  document.getElementById("tokenInput").value = token;
  refreshAll();
})();
</script>
</body>
</html>
